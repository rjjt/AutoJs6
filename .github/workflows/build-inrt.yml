name: Build Inrt APK (QQ Invite)

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Install CMake 3.10.2
        run: |
          wget -q https://cmake.org/files/v3.10/cmake-3.10.2-Linux-x86_64.sh
          chmod +x cmake-3.10.2-Linux-x86_64.sh
          sudo ./cmake-3.10.2-Linux-x86_64.sh --skip-license --prefix=/usr/local

      - name: Install Ninja
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Show project metadata
        run: |
          echo "=== project.json ==="
          cat app/src/main/assets-inrt/project/project.json
          echo "=== embedded scripts ==="
          find app/src/main/assets-inrt/project -type f | sort

      - name: Build Inrt Release APK
        run: ./gradlew assembleInrtRelease

      - name: Sign APK with debug key (no release keystore configured)
        run: |
          set -e
          # Find the unsigned APK(s)
          mapfile -t APKS < <(find app/build/outputs/apk/inrt/release -name "*.apk")
          if [ ${#APKS[@]} -eq 0 ]; then
            echo "No APK produced. Listing build outputs:"
            find app/build/outputs/apk -type f
            exit 1
          fi
          # Generate a debug keystore on the fly
          KEYSTORE="$HOME/qqinvite-debug.keystore"
          keytool -genkeypair -v -keystore "$KEYSTORE" \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -alias qqinvite -storepass android -keypass android \
            -dname "CN=qqinvite, OU=DEV, O=qqinvite, L=NA, S=NA, C=US"
          # Locate apksigner from the latest installed build-tools
          BT=$(ls -1 "$ANDROID_SDK_ROOT/build-tools" | sort -V | tail -n1)
          APKSIGNER="$ANDROID_SDK_ROOT/build-tools/$BT/apksigner"
          for APK in "${APKS[@]}"; do
            echo "Signing $APK"
            "$APKSIGNER" sign --ks "$KEYSTORE" --ks-pass pass:android \
              --key-pass pass:android --ks-key-alias qqinvite "$APK"
          done

      - name: Locate APK
        id: locate
        run: |
          set -e
          APK=$(find app/build/outputs/apk/inrt/release -name "*.apk" | head -n1)
          if [ -z "$APK" ]; then
            echo "No APK after signing!"
            exit 1
          fi
          echo "Found APK: $APK"
          NEW="模拟拉人-build${{ github.run_number }}.apk"
          cp "$APK" "$NEW"
          echo "renamed=$NEW" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 模拟拉人-apk-build${{ github.run_number }}
          path: ${{ steps.locate.outputs.renamed }}
          if-no-files-found: error

      - name: Create Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: 模拟拉人 build ${{ github.run_number }}
          files: ${{ steps.locate.outputs.renamed }}
          generate_release_notes: false
          body: |
            自动构建：commit ${{ github.sha }}
            构建号：${{ github.run_number }}
            分支：${{ github.ref_name }}
